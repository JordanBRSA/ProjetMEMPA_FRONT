<div>
  <div class="container d-flex flex-column w-50">
    <div class="">
      <h1 class="title">Ajouter une musique</h1>
      <div *ngIf="playlist">
        <p>Style : <span class="">{{playlist.style}} ( obligatoire )</span></p>



          <form (ngSubmit)="addMusic()" class="d-flex flex-column align-items-center">
            <div class="d-flex flex-column justify-content-between w-100 pb-4">
              <div class="d-flex flex-row justify-content-between my-2" >
                <label for="title" >Titre : </label>
                <input
                  id="title"
                  type="string"
                  [(ngModel)]="title"
                  name="title"
                  required
                />
              </div>

              <div class="d-flex flex-row justify-content-between my-2">
                <label for="title">Artiste</label>
                <input
                  id="artist"
                  type="string"
                  [(ngModel)]="artist"
                  name="artist"
                  required
                />
              </div>
            </div>

            <button type="submit" [disabled]="loading" class="btn-submit w-50">
              <span [@if]="!loading">AJOUTER</span>
            </button>
          </form>


        <p class="message" [@if]="message">{{ message }}</p>
      </div>
    </div>
  </div>
</div>
