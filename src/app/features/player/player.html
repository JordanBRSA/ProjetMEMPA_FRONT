<div class="player">

  <div class="player-left">
    <div class="music-info">

    </div>
  </div>

  <div class="player-center">

    <button>
      ⏮
    </button>

    <button (click)="togglePlay()">
      {{ isPlaying ? '⏸' : '▶' }}
    </button>

    <button>
      ⏭
    </button>

  </div>

  <div class="player-right">

    <input type="range">

  </div>

</div>
