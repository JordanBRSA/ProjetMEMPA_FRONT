<div class="container d-flex flex-column w-50">
  <h1 class="title">Ajouter une musique</h1>
  <div *ngIf="playlist">
    <p>Style : <span>{{playlist.style}} ( obligatoire )</span></p>

    <form (ngSubmit)="addMusic()" class="d-flex flex-column align-items-center">
      <div class="d-flex flex-column justify-content-between w-100 pb-4">

        <div class="d-flex flex-row justify-content-between my-2">
          <label for="title">Titre :</label>
          <input id="title" type="text" [(ngModel)]="title" name="title" required/>
        </div>

        <div class="d-flex flex-row justify-content-between my-2">
          <label for="artist">Artiste :</label>
          <input id="artist" type="text" [(ngModel)]="artist" name="artist" required/>
        </div>

        <div class="d-flex flex-row justify-content-between my-2">
          <label for="contributor">Contributeur :</label>
          <input id="contributor" type="text" [(ngModel)]="contributor" name="contributor" required/>
        </div>

        <div class="d-flex flex-row justify-content-between my-2">
          <label for="url">URL :</label>
          <input id="url" type="text" [(ngModel)]="url" name="url" required/>
        </div>

      </div>

      <button type="submit" [disabled]="loading" class="btn-submit w-50">
        {{ loading ? 'Ajout...' : 'AJOUTER' }}
      </button>
    </form>

    <p class="message" *ngIf="message">{{ message }}</p>
  </div>
</div>
