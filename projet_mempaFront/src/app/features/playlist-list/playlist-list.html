
<div class="playlist-container d-flex flex-column w-100">
  <div class="d-flex flex-row justify-content-between">

    <button class="btn d-flex flex-row align-items-center" (click)="onFilterPlaylist()">
      <img ngSrc="images/filtre_icon.png" alt="Filtrer les playlists" height="47" width="47" priority>
      <p class="filtre-txt">Filtrer</p>
    </button>
    <h1 class="title">Playlist</h1>
    <button class="btn " (click)="onCreatePlaylist()">
      <img ngSrc="images/plus_icon.png" alt="Ajouter une playlist" height="47" width="47" priority>
    </button>
  </div>
  <div *ngFor="let playlist of playlists" (click)="playerService.playMusic(playlist.musics[0])" class="mb-3">
    <a [routerLink]="['/playlist', playlist.id]" class="text-decoration-none text-dark">
      <div class="card-body">
        <h5 class="card-title">Playlist de : {{ playlist.creator }} </h5>
        <div class="d-flex flex-row justify-content-between px-3 card-info">
          <div>Style : {{ playlist.style }}</div>
          <div>Clics : {{ playlist.clicks }}</div>
        </div>
      </div>
    </a>
  </div>
</div>
